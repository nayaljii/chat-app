<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="rtca_fevicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main>
    <form id="registerForm">
        <fieldset>
            <legend>Register to Vish'sUp</legend>
            <div class="field">
                <div>
                    <label for="username">Username: </label>
                    <input class="inputopt" type="text" id="username" name="username" placeholder="Enter Username" required>
                </div>
                <div>
                    <label for="email">Email: </label>
                    <input class="inputopt" type="email" name="email" id="email" placeholder="youremail@example.com" required>
                </div>
                <div>
                    <label for="password">Password: </label>
                    <input class="inputopt" type="password" id="password" name="password" placeholder="Enter Password" required><span class="togglePassword" id="toggleRegisterPassword">👁️</span>
                </div>
            </div>
                <button type="submit" id="formBtn" class="btn">Register</button>
        </fieldset>
        <p id="back">If you already have an account, <a href="/login.html">login here</a>.</p>
    </form>
    </main>
    <script>
        const registerPassword = document.getElementById("password");
        const togglePassword = document.getElementById("toggleRegisterPassword");
        togglePassword.addEventListener("click", () => {
                if(registerPassword.type === "password") {
                registerPassword.setAttribute("type", "text");
                togglePassword.innerText = "🙈";
            } else {
                registerPassword.setAttribute("type", "password");
                togglePassword.innerText = "👁️";
            }
        });
        const form = document.getElementById("registerForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            document.getElementById("formBtn").innerText = "Registering...";
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if(data.token){
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.user.username);

                window.location.href = "/index.html";
            } else {
                alert(data.msg || "Registration failed");
            }
        });
    </script>
</body>
</html>
