<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="rtca_fevicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <header>
        <nav><div class="chat-header">
            <img class="logo" src="rtca_logo.png" alt="RTCA Logo">
            <h1>Register to Vish'sUp Chat</h1>
        </div></nav>
    </header>
    <form id="registerForm">
        <table align="center" cellpadding="10">
            <tr>
                <td><label for="username">Username: </label></td>
                <td><input type="text" id="username" name="username" placeholder="Enter Username" required></td>
            </tr>
             <tr>
                <td><label for="email">Email: </label></td>
                <td><input type="email" id="email" name="email" placeholder="Enter Email id" required></td>
            </tr>
            <tr>
                <td><label for="password">Password: </label></td>
                <td><input type="password" id="password" name="password" placeholder="Enter Password" required></td>
            </tr>
            <tr >
                <td align="center" colspan="2"><button id="formbtn" type="submit">Register</button></td>
            </tr>
        </table>
        <p id="back">If you already have an account, <a href="/login.html">login here</a>.</p>
    </form>

    <script>
        const form = document.getElementById("registerForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            document.getElementById("formbtn").innerText = "Registering...";
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if(data.token){
                // 🔥 save
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.user.username);

                // 🔥 redirect
                window.location.href = "/index.html";
            } else {
                alert(data.msg || "Registration failed");
            }
        });
    </script>
</body>
</html>
