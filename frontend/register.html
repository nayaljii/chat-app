<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="Upload/chatapp_favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main>
    <form id="registerForm">
        <fieldset>
            <legend>Register to Vish'sUp</legend>
            <div class="field">
                <div>
                    <label for="username">Username: </label>
                    <input class="inputopt" type="text" id="username" name="username" placeholder="Enter Username" required>
                </div>
                <div>
                    <label for="email">Email: </label>
                    <input class="inputopt" type="email" name="email" id="email" placeholder="youremail@example.com" required>
                </div>
                <div class="password-box">
                    <label for="password">Password: </label>
                    <input class="inputopt" type="password" id="password" name="password" placeholder="Enter Password" required><span class="togglePassword" id="toggleRegisterPassword">👁️</span>
                </div>
                <div id="otpSection" style="display: none;">
                    <label for="otp">Enter OTP: </label>
                    <input class="inputopt" type="text" name="otp" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
                </div>
            </div>
            <button type="button" id="sendOtpBtn" class="btn">Send OTP</button>
            <button type="button" id="verifyOtpBtn" class="btn" style="display: none;">Register</button>
        </fieldset>
        <p id="back">If you already have an account, <a href="/login.html">login here</a>.</p>
    </form>
    </main>
    <script>
        const BASE_URL = "https://groupchat-app-fut2.onrender.com";
        const sendOtpBtn = document.getElementById("sendOtpBtn");
        const verifyOtpBtn = document.getElementById("verifyOtpBtn");
        const otpSection = document.getElementById("otpSection");

        // 👁️ Password toggle
        const registerPassword = document.getElementById("password");
        const togglePassword = document.getElementById("toggleRegisterPassword");

        togglePassword.addEventListener("click", () => {
            if (registerPassword.type === "password") {
                registerPassword.type = "text";
                togglePassword.innerText = "🙈";
            } else {
                registerPassword.type = "password";
                togglePassword.innerText = "👁️";
            }
        });

        // SEND OTP
        sendOtpBtn.addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();

            if (!email) {
                alert("Please enter email");
                return;
            }

            sendOtpBtn.innerText = "Sending OTP...";

            try {
                const res = await fetch(`${BASE_URL}/api/auth/send-otp`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    otpSection.style.display = "block";
                    sendOtpBtn.style.display = "none";
                    verifyOtpBtn.style.display = "inline-block";
                }

            } catch (err) {
                console.error(err);
                alert("Error sending OTP");
            }

            sendOtpBtn.innerText = "Send OTP";
        });

        // VERIFY OTP + REGISTER
        verifyOtpBtn.addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const otp = document.getElementById("otp").value.trim();

            if (!username || !email || !password || !otp) {
                alert("Please fill all fields");
                return;
            }

            verifyOtpBtn.innerText = "Verifying...";

            try {
                const res = await fetch("https://groupchat-app-fut2.onrender.com/api/auth/verify-otp-register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, email, password, otp })
                });

                const data = await res.json();
                alert(data.message);

                if (res.ok) {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("username", data.user.username);

                    window.location.href = "/index.html";
                }

            } catch (err) {
                console.error(err);
                alert("Error verifying OTP");
            }

            verifyOtpBtn.innerText = "Register";
        });
    </script>
</body>
</html>
