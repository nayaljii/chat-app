<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vish'sUp AI</title>
  <link rel="stylesheet" href="chatbot.css" />
  <link rel="icon" type="image/png" href="chatapp_fevicon.png" />
</head>
<body class="bot-body">
    <main class="bot-app">
        <section class="bot-card">
            <header class="bot-header">
                <div class="bot-header-top">
                    <button class="back-btn" onclick="goBack()">Back</button>
                    <div class="bot-brand">
                        <h1>Vish'sUp AI</h1>
                        <p>Your smart chat assistant</p>
                    </div>
                    <button class="clear-btn" onclick="clearChat()">Clear All</button>
                </div>
            </header>

            <div class="bot-chat-box" id="bot-chatBox"></div>

            <form class="bot-input-area" id="bot-chatForm">
                <input
                    type="text"
                    id="bot-messageInput"
                    placeholder="Message Vish'sUp AI..."
                    autocomplete="off"
                    required
                />
                <button type="submit" class="send-btn">Send</button>
            </form>
        </section>
    </main>

  <script src="chatbot.js"></script>
</body>
</html>
