<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="rtca_fevicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main>
    <form id="loginForm">
        <fieldset>
            <legend>Login to Vish'sUp</legend>
            <div class="field">
                <div>
                    <label for="email">Email: </label>
                    <input class="inputopt" type="email" name="email" id="email" placeholder="youremail@example.com" required>
                </div>
                <div>
                    <label for="password">Password: </label>
                    <input class="inputopt" type="password" id="password" name="password" placeholder="Enter Password" required><span class="togglePassword" id="toggleLoginPassword">👁️</span>
                </div>
            </div>
                <button type="submit" id="formBtn" class="btn">Login</button>
        </fieldset>
        <p id="back">If you don't have an account, <a href="/register.html">register here</a>.</p>
    </form>
    </main>
    <script>
        const loginPassword = document.getElementById("password");
        const togglePassword = document.getElementById("toggleLoginPassword");
                togglePassword.addEventListener("click", () => {
                    if(loginPassword.type === "password") {
                        loginPassword.setAttribute("type", "text");
                        togglePassword.innerText = "🙈";
                    } else {
                        loginPassword.setAttribute("type", "password");
                        togglePassword.innerText = "👁️";
                    }
                });
        document.getElementById("loginForm").addEventListener("submit", async (e)=>{
        e.preventDefault();
        document.getElementById("formBtn").innerText = "Logging...";
        try{
            const res = await fetch("/api/auth/login", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                email: email.value,
                password: password.value
            })
        });

        const data = await res.json();

        if(data.token){
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", data.user.username);

            window.location.href = "/index.html";
        } else {
            alert("Login failed");
        }
        } catch(err){
            console.error(err);
            alert("Server error");
        }
        });
    </script>
</body>
</html>
