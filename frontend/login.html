<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="Upload/chatapp_favicon.ico" type="image/x-icon">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main>
    <form id="loginForm">
        <fieldset>
            <legend>Login to Vish'sUp</legend>
            <div id="g_id_onload"
                data-client_id="753074870781-vono8bdo7a3obht3d6tpigg2aj6uaus3.apps.googleusercontent.com"
                data-callback="handleGoogleLogin">
            </div>

            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="signin_with"
                data-shape="rectangular"
                data-logo_alignment="left">
            </div>
            <hr style="margin: 15px 0;">
            <div class="field">
                <div>
                    <label for="email">Email: </label>
                    <input class="inputopt" type="email" name="email" id="email" placeholder="youremail@example.com" required>
                </div>
                <div class="password-box">
                    <label for="password">Password: </label>
                    <input class="inputopt" type="password" id="password" name="password" placeholder="Enter Password" required><span class="togglePassword" id="toggleLoginPassword">👁️</span>
                </div>
            </div>
                <button type="submit" id="formBtn" class="btn">Login</button>
        </fieldset>
        <p id="back">If you don't have an account, <a href="/register.html">register here</a>.</p>
    </form>
    </main>
    <script>
        const BASE_URL = "https://groupchat-app-fut2.onrender.com";

        // Google Login
        async function handleGoogleLogin(response) {
            try {
                const res = await fetch(`${BASE_URL}/api/auth/google-login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        credential: response.credential
                    })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("username", data.user.username);
                    window.location.href = "/index.html";
                } else {
                    alert(data.msg || "Google login failed");
                }
            } catch (err) {
                console.error(err);
                alert("Google login error");
            }
        }

        const loginPassword = document.getElementById("password");
        const togglePassword = document.getElementById("toggleLoginPassword");
                togglePassword.addEventListener("click", () => {
                    if(loginPassword.type === "password") {
                        loginPassword.setAttribute("type", "text");
                        togglePassword.innerText = "🙈";
                    } else {
                        loginPassword.setAttribute("type", "password");
                        togglePassword.innerText = "👁️";
                    }
                });
        document.getElementById("loginForm").addEventListener("submit", async (e)=>{
        e.preventDefault();

        const formBtn = document.getElementById("formBtn");
        formBtn.innerText = "Logging...";

        const emailValue = document.getElementById("email").value.trim();
        const passwordValue = document.getElementById("password").value.trim();

        try{
            const res = await fetch(`${BASE_URL}/api/auth/login`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    email: emailValue,
                    password: passwordValue
                })
            });

            const data = await res.json();

            if(res.ok && data.token){
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.user.username);
                window.location.href = "/index.html";
            } else {
                alert(data.msg || "Login failed");
            }
        } catch(err){
            console.error(err);
            alert("Server error");
        }

        formBtn.innerText = "Login";
    });
    </script>
</body>
</html>
