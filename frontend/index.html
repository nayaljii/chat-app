<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application">
    <link rel="shortcut icon" href="Upload/chatapp_favicon.ico" type="image/x-icon">
    <script src="https://groupchat-app-fut2.onrender.com/socket.io/socket.io.js" defer></script>
    <script src="client.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main class="app-shell">

        <!-- LEFT SIDE / CHAT LIST -->
        <aside class="side-wrapper">

            <div class="brand">
                <div class="brand-logo">
                    <img src="Upload/chatapp_favicon.ico" alt="logo">
                </div>
                <div>
                    <h2>Vish'sUp</h2>
                    <p>Real Time Chat</p>
                </div>
            </div>

            <div id="chat-users" class="chat-list">
                <!-- Group, AI and private chats will show here -->
            </div>

        </aside>

        <!-- RIGHT SIDE / CHAT AREA -->
        <section class="chat-layout">

            <div class="chat-header">
                <button id="backToChatsBtn" class="back-btn">
                    <i class="ph ph-arrow-left"></i>
                </button>

                <div class="chat-header-title">
                    <h1 id="chatTitle">Vish'sUp</h1>
                    <p id="chatStatus">Select a chat</p>
                </div>
            </div>

            <div id="welcomeScreen" class="welcome-screen">
                <h1>Welcome to Vish'sUp</h1>
                <p>Select a chat to start messaging</p>
            </div>

            <div class="container" id="message-container">
                <!-- Messages will be appended here -->
            </div>

            <div id="typing-indicator"></div>

            <div class="send-wrapper">
                <div id="replyPreview" style="display:none;">
                    <span id="replyText"></span>
                    <button type="button" id="cancelReply">×</button>
                </div>

                <div id="emojiPickerContainer">
                    <emoji-picker id="emojiPicker"></emoji-picker>
                </div>

                <form action="#" id="send-container">
                    <button type="button" id="emojiBtn" class="emoji-btn">
                        <i class="ph ph-smiley-sticker"></i>
                    </button>

                    <input type="text" name="messageInp" id="messageInp" placeholder="Type a message..." autocomplete="off">

                    <button class="okbtn" type="submit" aria-label="Send">
                        <lottie-player
                            id="sendAnim"
                            src="arrow.json"
                            background="transparent"
                            speed="1"
                            style="width: 28px; height: 28px;">
                        </lottie-player>
                    </button>
                </form>
            </div>

        </section>

        <!-- TOP RIGHT MENU -->
        <input type="checkbox" id="menu-toggle" hidden>

        <label for="menu-toggle" class="menu-btn">
            <i class="ph ph-list menu-open-icon"></i>
            <i class="ph ph-x menu-close-icon"></i>
        </label>

        <label for="menu-toggle" class="menu-overlay"></label>

        <div class="menu-panel">
            <button id="toggle-registered-users" class="sidebar-btn">All Users</button>

            <div id="registered-users">
                <!-- Registered users will show here -->
            </div>

            <button id="logout" class="logout-btn" onclick="logout()">Logout</button>
        </div>

    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@latest/index.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</body>
</html>
