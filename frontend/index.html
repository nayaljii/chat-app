<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application">
    <link rel="shortcut icon" href="Upload/chatapp_favicon.ico" type="image/x-icon">
    <script src="https://groupchat-app-fut2.onrender.com/socket.io/socket.io.js" defer></script>
    <script src="client.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main class="app-shell">
      <input type="checkbox" id="menu-toggle" hidden>
      <label for="menu-toggle" class="sidebar-overlay"></label>
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-logo"><img src="Upload/chatapp_favicon.ico" alt="logo"></div>
                    <div>
                        <h2>Vish'sUp</h2>
                        <p>Real Time Chat</p>
                    </div>
                </div>
                <button id="toggle-registered-users" class="sidebar-btn">Registered Users</button>
                <div id="registered-users">
                    <!-- Registered users will show here -->
                </div>
                <button id="toggle-users" class="sidebar-btn">Online(0)</button>
                <div id="online-users">
                    <!-- Online User showing here -->
                </div>
            </div>

            <div class="sidebar-bottom">
                <button id="chatBot" class="chatbot-btn" onclick="openChatBot()">Chat AI</button>
                <button id="logout" class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </aside>

        <section class="chat-layout">
            <div class="mobile-topbar">
                <div class="mobile-topbar-title">
                    <h2>Vish'sUp</h2>
                    <p>Group Chat</p>
                </div>

                <label for="menu-toggle" class="mobile-topbar-menu">
                    <i class="ph ph-list menu-open-icon"></i>
                    <i class="ph ph-x menu-close-icon"></i>
                </label>
            </div>

            <div class="chat-header">
                <div class="chat-header-title">
                    <h1>Vish'sUp</h1>
                    <p>Group Chat</p>
                </div>
            </div>

            <div class="container" id="message-container">
                <!-- Messages will be appended here -->
            </div>
            <div id="typing-indicator">
                <!-- User is typing... -->
            </div>

            <div class="send-wrapper">
                <form action="#" id="send-container">
                    <input type="text" name="messageInp" id="messageInp" placeholder="Type a message..." autocomplete="off">
                    <button class="okbtn" type="submit" aria-label="Send">
                        <lottie-player
                            id="sendAnim"
                            src="arrow.json"
                            background="transparent"
                            speed="1"
                            style="width: 28px; height: 28px;"
                        ></lottie-player>
                    </button>
                </form>
            </div>
        </section>
    </main>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</body>
</html>
