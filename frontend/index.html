<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time chat application"> 
    <link rel="shortcut icon" href="rtca_fevicon.png" type="image/x-icon">
    <script src="https://groupchat-app-fut2.onrender.com/socket.io/socket.io.js" defer></script>
    <script src="client.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Vish'sUp</title>
</head>
<body>
    <main>
        <div class="navbar">
            <div class="nav-left">
                <h2>Vish'sUp</h2>
            </div>
            <div class="nav-right">
                <button id="toggle-users">Online (0)</button>
                <div id="online-users"></div>
                <button id="logout" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="container" id="message-container">
            <!-- Messages will be appended here -->
        </div>
        <div id="typing-indicator"></div>
        
        <!-- Input Area -->
        <div class="send">
            <form action="#" id="send-container">
                <input type="text" name="messageInp" id="messageInp" placeholder="Type a message...">
                <button class="okbtn" type="submit"><lottie-player
                    id="sendAnim"
                    src="arrow.json"
                    background="transparent"
                    speed="1"
                    style="width: 30px; height: 30px;">
                </lottie-player></button>
            </form>
        </div>
    </main>
    <footer>
        <p id="abt">© 2026 Vish'sUp. All rights reserved.</p>
    </footer>
</body>
<style>@import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');</style>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</html>
